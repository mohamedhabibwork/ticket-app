openapi: 3.1.0
info:
  title: Marketplace API
  version: 1.0.0
  description: Amazon Seller Central integration for buyer-seller messaging

paths:
  /marketplace/connect:
    post:
      operationId: connectMarketplace
      summary: Connect Amazon Seller Central
      tags: [Marketplace]
      security: [cookieAuth: [], bearerAuth: []]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/marketplaceConnect'
      responses:
        '200':
          description: Marketplace connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/marketplaceAccount'

  /marketplace/accounts:
    get:
      operationId: listMarketplaceAccounts
      summary: List marketplace accounts
      tags: [Marketplace]
      security: [cookieAuth: [], bearerAuth: []]
      responses:
        '200':
          description: Account list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/marketplaceAccount'

    delete:
      operationId: disconnectMarketplace
      summary: Disconnect marketplace
      tags: [Marketplace]
      security: [cookieAuth: [], bearerAuth: []]
      parameters:
        - name: accountId
          in: query
          schema:
            type: number
      responses:
        '200':
          description: Disconnected

  /marketplace/messages:
    get:
      operationId: listMarketplaceMessages
      summary: List Amazon messages
      tags: [Marketplace]
      security: [cookieAuth: [], bearerAuth: []]
      parameters:
        - name: accountId
          in: query
          schema:
            type: number
        - name: orderId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Message list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/marketplaceMessage'

  /marketplace/sync:
    post:
      operationId: syncMarketplaceMessages
      summary: Manually trigger Amazon message sync
      tags: [Marketplace]
      security: [cookieAuth: [], bearerAuth: []]
      parameters:
        - name: accountId
          in: query
          schema:
            type: number
      responses:
        '200':
          description: Sync started

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session_token
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    marketplaceConnect:
      type: object
      required: [region, clientId, clientSecret]
      properties:
        region:
          type: string
          enum: [na, eu, fe]
        clientId:
          type: string
        clientSecret:
          type: string
        refreshToken:
          type: string
    marketplaceAccount:
      type: object
      properties:
        id:
          type: number
        organizationId:
          type: number
        sellerId:
          type: string
        region:
          type: string
        marketplaceId:
          type: string
        isActive:
          type: boolean
        lastSyncAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
    marketplaceMessage:
      type: object
      properties:
        id:
          type: number
        accountId:
          type: number
        ticketId:
          type: number
        amazonMessageId:
          type: string
        orderId:
          type: string
        asin:
          type: string
        subject:
          type: string
        body:
          type: string
        marketplace:
          type: string
        createdAt:
          type: string
          format: date-time
