openapi: 3.1.0
info:
  title: Billing & Subscription API
  version: 1.0.0
  description: Subscription management, invoicing, and payment operations

paths:
  /billing/subscription:
    get:
      operationId: getSubscription
      summary: Get current subscription
      tags: [Billing]
      security: [cookieAuth: [], bearerAuth: []]
      responses:
        "200":
          description: Subscription details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/subscription"

    post:
      operationId: createSubscription
      summary: Create subscription
      tags: [Billing]
      security: [cookieAuth: [], bearerAuth: []]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [planId, billingCycle, seatCount]
              properties:
                planId:
                  type: string
                  format: uuid
                billingCycle:
                  type: string
                  enum: [monthly, annual]
                seatCount:
                  type: integer
                  minimum: 1
                couponCode:
                  type: string
      responses:
        "201":
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/subscription"

    patch:
      operationId: updateSubscription
      summary: Update subscription (upgrade/downgrade)
      tags: [Billing]
      security: [cookieAuth: [], bearerAuth: []]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                planId:
                  type: string
                  format: uuid
                billingCycle:
                  type: string
                  enum: [monthly, annual]
                seatCount:
                  type: integer
                  minimum: 1
      responses:
        "200":
          description: Subscription updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/subscription"

    delete:
      operationId: cancelSubscription
      summary: Cancel subscription
      tags: [Billing]
      security: [cookieAuth: [], bearerAuth: []]
      parameters:
        - name: immediate
          in: query
          schema:
            type: boolean
          description: Cancel immediately or at end of billing cycle
      responses:
        "200":
          description: Subscription canceled
          content:
            application/json:
              schema:
                type: object
                properties:
                  canceledAt:
                    type: string
                    format: date-time
                  effectiveDate:
                    type: string
                    format: date-time

  /billing/addons:
    get:
      operationId: listAvailableAddons
      summary: List available add-ons
      tags: [Billing]
      security: [cookieAuth: [], bearerAuth: []]
      responses:
        "200":
          description: Add-on list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/addon"

    post:
      operationId: subscribeAddon
      summary: Add add-on to subscription
      tags: [Billing]
      security: [cookieAuth: [], bearerAuth: []]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [addonId, quantity]
              properties:
                addonId:
                  type: string
                  format: uuid
                quantity:
                  type: integer
                  minimum: 1
      responses:
        "201":
          description: Add-on added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/subscriptionAddon"

  /billing/addons/{addonSubscriptionId}:
    delete:
      operationId: removeAddon
      summary: Remove add-on
      tags: [Billing]
      security: [cookieAuth: [], bearerAuth: []]
      parameters:
        - name: addonSubscriptionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Add-on removed

  /billing/invoices:
    get:
      operationId: listInvoices
      summary: List invoices
      tags: [Billing]
      security: [cookieAuth: [], bearerAuth: []]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Invoice list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/invoiceList"

  /billing/invoices/{invoiceId}:
    get:
      operationId: getInvoice
      summary: Get invoice
      tags: [Billing]
      security: [cookieAuth: [], bearerAuth: []]
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Invoice details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/invoiceDetail"

  /billing/invoices/{invoiceId}/pdf:
    get:
      operationId: downloadInvoicePdf
      summary: Download invoice PDF
      tags: [Billing]
      security: [cookieAuth: [], bearerAuth: []]
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: PDF download
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /billing/payment-methods:
    get:
      operationId: listPaymentMethods
      summary: List payment methods
      tags: [Billing]
      security: [cookieAuth: [], bearerAuth: []]
      responses:
        "200":
          description: Payment method list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/paymentMethod"

    post:
      operationId: addPaymentMethod
      summary: Add payment method
      tags: [Billing]
      security: [cookieAuth: [], bearerAuth: []]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [gateway, token]
              properties:
                gateway:
                  type: string
                  enum: [stripe, paytabs]
                token:
                  type: string
                setAsDefault:
                  type: boolean
      responses:
        "201":
          description: Payment method added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/paymentMethod"

  /billing/payment-methods/{paymentMethodId}:
    delete:
      operationId: removePaymentMethod
      summary: Remove payment method
      tags: [Billing]
      security: [cookieAuth: [], bearerAuth: []]
      parameters:
        - name: paymentMethodId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Payment method removed

    patch:
      operationId: setDefaultPaymentMethod
      summary: Set default payment method
      tags: [Billing]
      security: [cookieAuth: [], bearerAuth: []]
      parameters:
        - name: paymentMethodId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Default updated

  /billing/coupon:
    post:
      operationId: applyCoupon
      summary: Apply coupon code
      tags: [Billing]
      security: [cookieAuth: [], bearerAuth: []]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        "200":
          description: Coupon applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  couponId:
                    type: string
                    format: uuid
                  discount:
                    type: object
                    properties:
                      type:
                        type: string
                      value:
                        type: number
                      duration:
                        type: string

  /billing/portal:
    get:
      operationId: getBillingPortalUrl
      summary: Get Stripe billing portal URL
      tags: [Billing]
      security: [cookieAuth: [], bearerAuth: []]
      responses:
        "200":
          description: Portal URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri

  /admin/billing/organizations:
    get:
      operationId: listOrganizationBilling
      summary: List all org billing (admin)
      tags: [AdminBilling]
      security: [cookieAuth: [], bearerAuth: []]
      parameters:
        - name: planId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [trialing, active, past_due, paused, canceled]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Organization billing list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/organizationBillingList"

    patch:
      operationId: updateOrganizationBilling
      summary: Update org billing manually (admin)
      tags: [AdminBilling]
      security: [cookieAuth: [], bearerAuth: []]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                planId:
                  type: string
                  format: uuid
                trialEndsAt:
                  type: string
                  format: date-time
                status:
                  type: string
                  enum: [active, paused]
      responses:
        "200":
          description: Organization updated

  /admin/billing/plans:
    get:
      operationId: listPlans
      summary: List subscription plans
      tags: [AdminBilling]
      security: [cookieAuth: [], bearerAuth: []]
      responses:
        "200":
          description: Plan list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/subscriptionPlan"

    post:
      operationId: createPlan
      summary: Create subscription plan
      tags: [AdminBilling]
      security: [cookieAuth: [], bearerAuth: []]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/subscriptionPlanCreate"
      responses:
        "201":
          description: Plan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/subscriptionPlan"

  /admin/billing/revenue:
    get:
      operationId: getRevenueMetrics
      summary: Get revenue metrics
      tags: [AdminBilling]
      security: [cookieAuth: [], bearerAuth: []]
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: planId
          in: query
          schema:
            type: string
            format: uuid
        - name: country
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Revenue metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/revenueMetrics"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session_token
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    subscription:
      $ref: "./schemas/subscription.yaml"
    subscriptionPlan:
      $ref: "./schemas/subscriptionPlan.yaml"
    subscriptionPlanCreate:
      $ref: "./schemas/subscriptionPlanCreate.yaml"
    addon:
      $ref: "./schemas/addon.yaml"
    subscriptionAddon:
      $ref: "./schemas/subscriptionAddon.yaml"
    invoice:
      $ref: "./schemas/invoice.yaml"
    invoiceDetail:
      $ref: "./schemas/invoiceDetail.yaml"
    invoiceList:
      $ref: "./schemas/invoiceList.yaml"
    paymentMethod:
      $ref: "./schemas/paymentMethod.yaml"
    revenueMetrics:
      $ref: "./schemas/revenueMetrics.yaml"
    organizationBillingList:
      $ref: "./schemas/organizationBillingList.yaml"
