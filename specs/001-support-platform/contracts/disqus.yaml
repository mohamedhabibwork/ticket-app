openapi: 3.1.0
info:
  title: Disqus API
  version: 1.0.0
  description: Disqus forum integration for importing comments as tickets

paths:
  /disqus/connect:
    post:
      operationId: connectDisqusForum
      summary: Connect Disqus forum
      tags: [Disqus]
      security: [cookieAuth: [], bearerAuth: []]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/disqusConnect'
      responses:
        '200':
          description: Forum connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/disqusAccount'

  /disqus/accounts:
    get:
      operationId: listDisqusAccounts
      summary: List Disqus accounts
      tags: [Disqus]
      security: [cookieAuth: [], bearerAuth: []]
      responses:
        '200':
          description: Account list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/disqusAccount'

    delete:
      operationId: disconnectDisqus
      summary: Disconnect Disqus forum
      tags: [Disqus]
      security: [cookieAuth: [], bearerAuth: []]
      parameters:
        - name: accountId
          in: query
          schema:
            type: number
      responses:
        '200':
          description: Disconnected

  /disqus/sync:
    post:
      operationId: syncDisqusComments
      summary: Manually trigger Disqus comment sync
      tags: [Disqus]
      security: [cookieAuth: [], bearerAuth: []]
      parameters:
        - name: accountId
          in: query
          schema:
            type: number
      responses:
        '200':
          description: Sync started

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session_token
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    disqusConnect:
      type: object
      required: [forumId, apiKey]
      properties:
        forumId:
          type: string
        apiKey:
          type: string
        apiSecret:
          type: string
    disqusAccount:
      type: object
      properties:
        id:
          type: number
        organizationId:
          type: number
        forumId:
          type: string
        forumName:
          type: string
        apiKey:
          type: string
        isActive:
          type: boolean
        lastSyncAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
